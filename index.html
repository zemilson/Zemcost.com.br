<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zem Costa — Marketplace de Software</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d1b3e;--navy2:#132244;--navy3:#1a2d58;--teal:#2ec4a0;--teal2:#25a888;--teal3:#1a8f72;--green:#4cdb8a;--grad:linear-gradient(135deg,#2ec4a0,#4cdb8a);--border:rgba(0,0,0,0.08);--text:#1a2744;--muted:#7a8faf;--muted2:#5a7090;--surface:#f4f7fb;--gold:#f5a623;--red:#e8364a;--shadow:0 2px 12px rgba(13,27,62,0.07);--shadow2:0 8px 32px rgba(13,27,62,0.12)}
html{scroll-behavior:smooth}body{background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden}
nav{position:sticky;top:0;z-index:500;background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:68px;box-shadow:var(--shadow)}
.nav-logo{display:flex;align-items:center;gap:0.5rem}.nav-logo img{height:52px;width:auto;object-fit:contain}
.nav-links{display:flex;gap:2rem}.nav-links a{color:var(--muted2);text-decoration:none;font-size:0.85rem;font-weight:700;transition:color 0.2s}.nav-links a:hover{color:var(--teal)}
.nav-right{display:flex;gap:0.6rem;align-items:center}
.btn{padding:0.48rem 1.1rem;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;border:none}
.btn-ghost{background:transparent;color:var(--muted2);border:1.5px solid var(--border)}.btn-ghost:hover{color:var(--text)}
.btn-teal{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(46,196,160,0.3)}.btn-teal:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(46,196,160,0.45)}
.cart-ico{position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem}.cart-ico:hover{border-color:var(--teal)}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--teal);color:#fff;width:17px;height:17px;border-radius:50%;font-size:0.62rem;font-weight:900;display:flex;align-items:center;justify-content:center}
.adm-btn{background:rgba(245,166,35,0.1);border:1.5px solid rgba(245,166,35,0.35);color:#a06800;padding:0.4rem 0.9rem;border-radius:8px;font-size:0.78rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif}
.my-acc-btn{background:rgba(13,27,62,0.06);border:1.5px solid rgba(13,27,62,0.12);color:var(--navy2);padding:0.4rem 0.9rem;border-radius:8px;font-size:0.78rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif}
.hero{background:linear-gradient(135deg,var(--navy),#1a3a6e);padding:5rem 2rem 4rem;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;opacity:0.05;background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:32px 32px}
.hero-tag{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(46,196,160,0.15);border:1px solid rgba(46,196,160,0.35);color:#7aead8;border-radius:100px;padding:0.3rem 1rem;font-size:0.75rem;font-weight:800;margin-bottom:1.4rem;text-transform:uppercase;letter-spacing:0.8px}
.hero-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.hero h1{font-size:clamp(2rem,4.5vw,3.2rem);font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1px;margin-bottom:1.1rem}
.hero h1 em{color:var(--teal);font-style:normal}
.hero p{color:rgba(255,255,255,0.65);font-size:1rem;max-width:520px;margin:0 auto 2rem;line-height:1.7}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-lg{padding:0.85rem 2rem;font-size:0.95rem;border-radius:10px}
.btn-wh{background:transparent;border:2px solid rgba(255,255,255,0.3);color:#fff;font-weight:700}.btn-wh:hover{border-color:#fff}
.hero-nums{display:flex;gap:3rem;justify-content:center;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.1);flex-wrap:wrap}
.hnum-val{font-size:1.8rem;font-weight:900;color:#fff}.hnum-val em{color:var(--teal);font-style:normal}
.hnum-lbl{font-size:0.7rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px;font-weight:700}
.search-sec{max-width:1100px;margin:2.5rem auto;padding:0 2rem}
.search-bar{display:flex;align-items:center;gap:0.8rem;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:0.55rem 0.55rem 0.55rem 1.2rem;box-shadow:var(--shadow);transition:border-color 0.2s}
.search-bar:focus-within{border-color:var(--teal)}.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem}.search-bar input::placeholder{color:var(--muted)}
.search-go{background:var(--grad);color:#fff;border:none;border-radius:9px;padding:0.62rem 1.4rem;font-weight:900;font-size:0.88rem;cursor:pointer;font-family:'Nunito',sans-serif}
.chips{display:flex;gap:0.45rem;margin-top:1rem;flex-wrap:wrap;align-items:center}
.chip-lbl{font-size:0.7rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:0.5px}
.chip{padding:0.32rem 0.9rem;border-radius:100px;background:#fff;border:1.5px solid var(--border);color:var(--muted2);font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.2s}.chip:hover,.chip.on{background:rgba(46,196,160,0.08);border-color:rgba(46,196,160,0.4);color:var(--teal3)}
.sec{max-width:1100px;margin:0 auto;padding:0 2rem 3rem}
.sec-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem}
.sec-title{font-size:1.3rem;font-weight:900;letter-spacing:-0.3px;color:var(--navy)}.sec-title em{color:var(--teal);font-style:normal}
.sec-sub{font-size:0.75rem;color:var(--muted);margin-top:0.2rem}
.see-all{color:var(--teal3);font-size:0.82rem;font-weight:800;text-decoration:none}.see-all:hover{text-decoration:underline}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.1rem}
.pc{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:var(--shadow)}.pc:hover{transform:translateY(-5px);border-color:rgba(46,196,160,0.35);box-shadow:var(--shadow2)}
.pc-thumb{height:130px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative}
.t1{background:linear-gradient(135deg,#071530,#0d2d5e,#1a5abf)}.t2{background:linear-gradient(135deg,#051a15,#0a3d2e,#1a8060)}.t3{background:linear-gradient(135deg,#1a1200,#3d2800,#8a6000)}.t4{background:linear-gradient(135deg,#1a0520,#3d1050,#8020b0)}.t5{background:linear-gradient(135deg,#0a1a00,#204000,#449000)}.t6{background:linear-gradient(135deg,#200010,#500030,#c0006a)}.t7{background:linear-gradient(135deg,#001a1a,#003d3d,#008080)}.t8{background:linear-gradient(135deg,#1a0800,#3d1a00,#8a4000)}
.pc-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);color:rgba(255,255,255,0.9);padding:0.18rem 0.55rem;border-radius:5px;font-size:0.62rem;font-weight:800;text-transform:uppercase}
.pc-hot{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;padding:0.18rem 0.55rem;border-radius:5px;font-size:0.62rem;font-weight:900}
.pc-new{position:absolute;top:8px;right:8px;background:var(--teal);color:#fff;padding:0.18rem 0.55rem;border-radius:5px;font-size:0.62rem;font-weight:900}
.pc-body{padding:1rem}.pc-vendor{font-size:0.68rem;color:var(--teal3);font-weight:800;margin-bottom:0.25rem}
.pc-name{font-size:0.88rem;font-weight:800;line-height:1.3;margin-bottom:0.45rem;color:var(--navy)}
.pc-stars{display:flex;align-items:center;gap:0.35rem;margin-bottom:0.7rem}.stars{color:var(--gold);font-size:0.75rem}.rcount{font-size:0.7rem;color:var(--muted)}
.pc-bot{display:flex;align-items:center;justify-content:space-between;border-top:1.5px solid var(--border);padding-top:0.7rem}
.p-old{font-size:0.7rem;color:var(--muted);text-decoration:line-through}.p-main{font-size:1.05rem;font-weight:900;color:var(--navy)}.p-tag{font-size:0.62rem;color:var(--muted);font-weight:600}
.pbuy{background:rgba(46,196,160,0.1);border:1.5px solid rgba(46,196,160,0.3);color:var(--teal3);padding:0.4rem 0.85rem;border-radius:7px;font-size:0.75rem;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif}.pbuy:hover{background:var(--teal);color:#fff}
.bnr-wrap{max-width:1100px;margin:0 auto;padding:0 2rem 3rem}
.bnr{background:linear-gradient(135deg,#0a1f40,#0d2a20);border-radius:20px;padding:3rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;position:relative;overflow:hidden}
.bnr::before{content:'';position:absolute;top:-80px;left:40%;width:350px;height:350px;background:radial-gradient(circle,rgba(46,196,160,0.12),transparent 65%);border-radius:50%}
.bnr-tag{display:inline-block;background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);color:var(--gold);padding:0.28rem 0.85rem;border-radius:6px;font-size:0.7rem;font-weight:900;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:1rem}
.bnr h2{font-size:2rem;font-weight:900;letter-spacing:-0.5px;line-height:1.1;margin-bottom:0.7rem;color:#fff}.bnr h2 em{color:var(--teal);font-style:normal}
.bnr p{color:rgba(255,255,255,0.6);max-width:380px;font-size:0.9rem;line-height:1.6}
.bnr-plans{display:flex;gap:1rem;flex-shrink:0;position:relative;z-index:1}
.bpl{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:1.4rem 1.6rem;text-align:center;min-width:130px}
.bpl.feat{border-color:var(--teal);background:rgba(46,196,160,0.1);box-shadow:0 0 24px rgba(46,196,160,0.15)}
.bpl-lbl{font-size:0.68rem;color:rgba(255,255,255,0.5);font-weight:800;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.5rem}
.bpl-price{font-size:1.8rem;font-weight:900;color:#fff}.bpl.feat .bpl-price{color:var(--teal)}.bpl-per{font-size:0.68rem;color:rgba(255,255,255,0.4);margin-top:0.2rem}
.pgrd{display:grid;grid-template-columns:repeat(3,1fr);gap:1.3rem}
.plc{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:2rem;position:relative;transition:all 0.25s;box-shadow:var(--shadow)}.plc:hover{transform:translateY(-3px);box-shadow:var(--shadow2)}
.plc.feat{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,196,160,0.1),var(--shadow2)}
.plc-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;padding:0.22rem 1.2rem;border-radius:0 0 10px 10px;font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.8px}
.plc-type{font-size:0.72rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.7rem}
.plc-big{font-size:2.6rem;font-weight:900;line-height:1;margin-bottom:0.3rem;color:var(--navy)}.plc-big sup{font-size:1rem;vertical-align:super}.plc-big .per{font-size:0.9rem;color:var(--muted);font-weight:600}
.plc-desc{font-size:0.82rem;color:var(--muted);margin-bottom:1.4rem;line-height:1.5}
.plc-feats{list-style:none;display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.8rem}
.plc-feats li{display:flex;align-items:center;gap:0.6rem;font-size:0.84rem;color:var(--text)}
.fi{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;flex-shrink:0}
.fok{background:rgba(46,196,160,0.12);color:var(--teal3)}.fno{background:rgba(90,112,144,0.1);color:var(--muted)}li.off{color:var(--muted)}
.plc-btn{width:100%;padding:0.82rem;border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:900;cursor:pointer;transition:all 0.2s}
.plc-btn-g{background:transparent;border:1.5px solid var(--border);color:var(--text)}.plc-btn-g:hover{border-color:var(--teal);color:var(--teal3)}
.plc-btn-t{background:var(--grad);color:#fff;border:none;box-shadow:0 4px 18px rgba(46,196,160,0.35)}.plc-btn-t:hover{box-shadow:0 6px 26px rgba(46,196,160,0.5);transform:translateY(-1px)}
.plc-btn-v{background:linear-gradient(135deg,#1a3a6e,#0d1b3e);color:#fff;border:none}.plc-btn-v:hover{transform:translateY(-1px)}
.pay-box{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:var(--shadow)}
.pay-box-title{font-size:1.1rem;font-weight:900;margin-bottom:1.4rem;color:var(--navy)}
.pay-mthds{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.9rem;margin-bottom:2rem}
.pmth{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:1.2rem 1rem;text-align:center;cursor:pointer;transition:all 0.2s}.pmth:hover{border-color:rgba(46,196,160,0.4);transform:translateY(-3px);box-shadow:var(--shadow2)}
.pmth-ico{font-size:1.8rem;margin-bottom:0.5rem}.pmth-name{font-size:0.83rem;font-weight:800;margin-bottom:0.2rem;color:var(--navy)}.pmth-sub{font-size:0.68rem;color:var(--muted)}
.sec-badges{display:flex;flex-wrap:wrap;gap:0.7rem}
.sbadge{display:flex;align-items:center;gap:0.45rem;background:rgba(46,196,160,0.07);border:1px solid rgba(46,196,160,0.2);color:var(--teal3);padding:0.38rem 1rem;border-radius:8px;font-size:0.74rem;font-weight:800}
.about-box{background:linear-gradient(135deg,rgba(46,196,160,0.06),rgba(13,45,94,0.04));border:1.5px solid rgba(46,196,160,0.15);border-radius:20px;padding:2.5rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.about-title{font-size:1.8rem;font-weight:900;line-height:1.1;margin-bottom:0.8rem;color:var(--navy)}.about-title em{color:var(--teal);font-style:normal}
.about-desc{color:var(--muted2);line-height:1.7;font-size:0.9rem;margin-bottom:1.5rem}
.steps{display:flex;flex-direction:column;gap:1rem}.srow{display:flex;gap:1rem;align-items:flex-start}
.sdot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:900;background:rgba(46,196,160,0.1);border:1.5px solid rgba(46,196,160,0.3);color:var(--teal3)}
.srow h4{font-size:0.88rem;font-weight:800;margin-bottom:0.18rem;color:var(--navy)}.srow p{font-size:0.78rem;color:var(--muted);line-height:1.5}
.about-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:1.8rem;box-shadow:var(--shadow2)}
.about-card-val{font-size:2rem;font-weight:900;color:var(--teal3);margin:0.4rem 0}
.about-mini{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-top:0.8rem}
.ami{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:0.8rem}.ami-v{font-weight:900;font-size:1.1rem;color:var(--navy)}.ami-l{font-size:0.68rem;color:var(--muted)}
footer{background:var(--navy);padding:2.5rem 2rem}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.2rem}
footer p{color:rgba(255,255,255,0.4);font-size:0.78rem}
.f-links{display:flex;gap:1.5rem}.f-links a{color:rgba(255,255,255,0.45);text-decoration:none;font-size:0.78rem;font-weight:700;transition:color 0.2s}.f-links a:hover{color:var(--teal)}
.overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(13,27,62,0.55);backdrop-filter:blur(6px);align-items:center;justify-content:center}.overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:2rem;width:90%;max-width:480px;position:relative;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(13,27,62,0.2)}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes popIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:none}}
.mclose{position:absolute;top:1rem;right:1rem;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.88rem}.mclose:hover{color:var(--text)}
.modal-title{font-size:1.3rem;font-weight:900;margin-bottom:0.3rem;color:var(--navy)}.modal-sub{color:var(--muted2);font-size:0.84rem;margin-bottom:1.5rem}
.field{margin-bottom:1rem}.field label{display:block;font-size:0.72rem;font-weight:900;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:0.68rem 0.95rem;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,196,160,0.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.pay-final{width:100%;background:var(--grad);color:#fff;border:none;padding:0.95rem;border-radius:12px;font-size:0.95rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 20px rgba(46,196,160,0.35);transition:all 0.2s}.pay-final:hover{box-shadow:0 6px 28px rgba(46,196,160,0.5);transform:translateY(-1px)}
.ptabs{display:flex;background:var(--surface);border-radius:10px;padding:4px;gap:4px;margin-bottom:1.4rem}
.ptab{flex:1;padding:0.52rem;border-radius:7px;background:transparent;border:none;color:var(--muted2);font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:800;cursor:pointer;transition:all 0.2s;text-align:center}.ptab.on{background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.cv{background:linear-gradient(135deg,#0d1b3e,#1a3a6e);border-radius:14px;padding:1.4rem 1.5rem;margin-bottom:1.3rem}
.cv-chip{font-size:1.3rem;margin-bottom:0.7rem}.cv-num{font-family:'JetBrains Mono',monospace;font-size:1rem;letter-spacing:3px;color:#fff;margin-bottom:0.7rem}
.cv-row{display:flex;justify-content:space-between}.cvf .cl{font-size:0.6rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px}.cvf .cv2{font-size:0.82rem;font-weight:700;color:#fff}
.inst-hint{font-size:0.7rem;color:var(--teal3);font-weight:800;margin-top:0.3rem}
.m-total{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:0.9rem 1.1rem;margin-bottom:1.2rem}
.mt-lbl{font-size:0.83rem;color:var(--muted)}.mt-val{font-size:1.3rem;font-weight:900;color:var(--teal3)}
.pix-area{text-align:center;padding:1rem 0}.pix-qr{width:140px;height:140px;background:var(--surface);border-radius:12px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:3rem;border:2px solid var(--teal)}

.popt .pck{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;background:var(--teal);color:#fff;font-size:0.58rem;display:none;align-items:center;justify-content:center;font-weight:900}.popt.sel .pck{display:flex}
.poi{font-size:1.5rem;margin-bottom:0.4rem}.pol{font-size:0.8rem;font-weight:900;color:var(--navy);margin-bottom:0.18rem}.pod{font-size:0.65rem;color:var(--muted);line-height:1.4}
.pf{display:none}.pf.show{display:block}
.pp{background:var(--navy);border-radius:10px;padding:0.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;margin-top:0.7rem}
.pp-lbl{font-size:0.68rem;color:rgba(255,255,255,0.45);font-weight:700}.pp-val{font-size:1.2rem;font-weight:900;color:var(--teal)}.pp-tag{font-size:0.62rem;color:rgba(255,255,255,0.35)}
.topts{display:grid;grid-template-columns:repeat(5,1fr);gap:0.45rem;margin-top:0.5rem}.topt{height:48px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;border:2px solid transparent;transition:all 0.2s}.topt:hover,.topt.sel{border-color:var(--teal);transform:scale(1.05)}
.psum{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:1rem}
.psr{display:flex;justify-content:space-between;padding:0.38rem 0;font-size:0.82rem;border-bottom:1px solid var(--border)}.psr:last-child{border-bottom:none}.psr .k{color:var(--muted);font-weight:700}.psr .v{font-weight:900;color:var(--navy)}.psr .v.t{color:var(--teal3)}
.mnav{display:flex;gap:0.7rem;margin-top:1.3rem}
.btn-back{background:transparent;border:1.5px solid var(--border);color:var(--muted2);padding:0.68rem 1.2rem;border-radius:9px;font-size:0.85rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s}.btn-back:hover{border-color:var(--navy);color:var(--navy)}
.btn-next{flex:1;background:var(--grad);color:#fff;border:none;padding:0.68rem;border-radius:9px;font-size:0.88rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s}.btn-next:hover{box-shadow:0 4px 16px rgba(46,196,160,0.35);transform:translateY(-1px)}
.btn-pub{flex:1;background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;border:none;padding:0.68rem;border-radius:9px;font-size:0.88rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s}.btn-pub:hover{transform:translateY(-1px)}
.notif{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;background:var(--navy);color:#fff;padding:0.85rem 1.3rem;border-radius:12px;font-size:0.83rem;font-weight:800;box-shadow:0 8px 32px rgba(13,27,62,0.25);border-left:4px solid var(--teal);transform:translateX(200%);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1)}.notif.show{transform:translateX(0)}
@media(max-width:768px){.hero{padding:3rem 1.5rem 2.5rem}.pgrd{grid-template-columns:1fr}.about-box{grid-template-columns:1fr}.nav-links{display:none}.bnr{flex-direction:column}.bnr-plans{justify-content:center}.prof-grid{grid-template-columns:1fr}.adm-kpis{grid-template-columns:1fr 1fr}.gw-grid{grid-template-columns:1fr}.cfg-grid{grid-template-columns:1fr}.adm-tabs{flex-wrap:wrap;width:100%}}</style>
